services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/trader
      SPRING_DATASOURCE_USERNAME: trader
      SPRING_DATASOURCE_PASSWORD: trader
      JWT_SECRET: change-me-in-production-use-at-least-256-bits-secret-key
      JWT_ACCESS_TTL: 30m
      JWT_REFRESH_TTL: 7d
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      SERVER_PORT: 8000
