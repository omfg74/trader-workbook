spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: test-secret-key-at-least-256-bits-long-for-hmac-sha256
    access-ttl: 30m
    refresh-ttl: 7d
  admin:
    username: admin
    password: admin

server:
  port: 8000
